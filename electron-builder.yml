appId: com.trove.app
productName: Trove
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
win:
  target:
    - target: nsis
      arch: [x64]
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.utilities
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Utility
